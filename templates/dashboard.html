<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Cyber Threat Detector</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="card">

        <h1>AI Cybersecurity Threat Detector</h1>

        <p class="subtitle">
            Machine Learning Powered URL Threat Analysis
        </p>

        <form action="/check_url" method="POST">

            <input
                type="text"
                name="url"
                placeholder="Enter suspicious URL..."
                required
            >

            <button type="submit">
                Analyze Threat
            </button>

        </form>

        {% if result %}

        <div class="result-box">

            <h2>{{ result }}</h2>

            <p>
                URL:
                <strong>{{ url }}</strong>
            </p>

        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
